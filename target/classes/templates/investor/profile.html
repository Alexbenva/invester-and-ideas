<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Investor Profile')}"></head>
<body class="vb-body d-flex flex-column min-vh-100">
<div th:replace="~{layout/fragments :: navbar}"></div>
<main class="container py-4 py-lg-5 flex-grow-1">
    <div class="auth-card auth-card-lg mx-auto shadow-soft p-0 overflow-hidden w-100">
        <div class="row g-0">
            <div class="col-lg-4 d-none d-lg-block">
                <div class="vb-auth-illustration h-100 p-5 d-flex align-items-end">
                    <div class="content">
                        <span class="vb-pill mb-3"><i class="bi bi-person-badge"></i> Investor profile</span>
                        <h2 class="display-6 fw-bold mb-3">Shape your investment focus.</h2>
                        <p class="mb-0 opacity-90">Define your organization, investment range, and interests in a premium profile layout.</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="vb-panel h-100 border-0 rounded-0 shadow-none">
                    <div class="vb-panel-inner">
                        <span class="vb-pill mb-3"><i class="bi bi-pencil-square"></i> Profile settings</span>
                        <h1 class="h3 mb-2">Investor Profile</h1>
                        <p class="vb-faint mb-4">Share your preferences so founders can understand your investment style.</p>
                        <div th:if="${errorMessage != null}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
                        <div th:if="${successMessage != null}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>

                        <form th:action="@{/investor/profile}" th:object="${investorProfileRequest}" method="post" class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label vb-form-label">Organization</label>
                                <input class="form-control" th:field="*{organization}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('organization')}" th:errors="*{organization}"></div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label vb-form-label">Min Investment</label>
                                <input type="number" class="form-control" th:field="*{investmentMin}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('investmentMin')}" th:errors="*{investmentMin}"></div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label vb-form-label">Max Investment</label>
                                <input type="number" class="form-control" th:field="*{investmentMax}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('investmentMax')}" th:errors="*{investmentMax}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label vb-form-label">Experience</label>
                                <textarea class="form-control" rows="3" th:field="*{experience}"></textarea>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('experience')}" th:errors="*{experience}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label vb-form-label">Bio</label>
                                <textarea class="form-control" rows="3" th:field="*{bio}"></textarea>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('bio')}" th:errors="*{bio}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label vb-form-label">Industries Interested</label>
                                <input class="form-control" th:field="*{industriesInterested}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('industriesInterested')}" th:errors="*{industriesInterested}"></div>
                            </div>
                            <div class="col-12"><button class="btn btn-primary w-100 py-3" type="submit">Save Profile</button></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout/fragments :: footer}"></div>
<th:block th:replace="~{layout/fragments :: scripts}"></th:block>
</body>
</html>
