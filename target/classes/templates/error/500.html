<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Internal Server Error')}"></head>
<body class="vb-body d-flex flex-column min-vh-100">
<div th:replace="~{layout/fragments :: navbar}"></div>
<main class="container flex-grow-1 d-flex align-items-center py-5">
    <div class="vb-card vb-surface shadow-soft mx-auto text-center text-dark" style="max-width: 720px;">
        <span class="vb-pill mb-3 text-warning"><i class="bi bi-exclamation-octagon"></i> Server Error</span>
        <h1 class="vb-section-title mb-3">Something went wrong.</h1>
        <p class="vb-lead mb-4 text-secondary" th:text="${error != null ? error : 'An unexpected error occurred on the server. Please try again later.'}">Error message details.</p>
        <a th:href="@{/}" class="btn btn-primary px-4"><i class="bi bi-house-door me-2"></i>Back to Home</a>
    </div>
</main>
<div th:replace="~{layout/fragments :: footer}"></div>
<th:block th:replace="~{layout/fragments :: scripts}"></th:block>
</body>
</html>
