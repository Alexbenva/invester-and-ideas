<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Login')}"></head>
<body class="vb-body d-flex flex-column min-vh-100">
<div th:replace="~{layout/fragments :: navbar}"></div>
<main class="container py-4 py-lg-5 flex-grow-1 d-flex align-items-center">
    <div class="auth-card auth-card-lg mx-auto shadow-soft p-0 overflow-hidden w-100">
        <div class="row g-0">
            <div class="col-lg-5 d-none d-lg-block">
                <div class="vb-auth-illustration h-100 p-5 d-flex align-items-end">
                    <div class="content">
                        <span class="vb-pill mb-3"><i class="bi bi-shield-lock-fill"></i> Secure access</span>
                        <h2 class="display-6 fw-bold mb-3">Welcome back.</h2>
                        <p class="mb-0 opacity-90">Sign in to manage profiles, dashboards, and startup activity from a refined, responsive workspace.</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="vb-panel h-100 border-0 rounded-0 shadow-none">
                    <div class="vb-panel-inner">
                        <span class="vb-pill mb-3"><i class="bi bi-box-arrow-in-right"></i> Sign in</span>
                        <h1 class="h3 mb-2">Login</h1>
                        <p class="vb-faint mb-4">Enter your credentials to continue.</p>
                        
                        <div th:if="${param.error}" class="alert alert-danger" role="alert">Invalid email or password.</div>
                        <div th:if="${param.logout}" class="alert alert-success" role="alert">You have been logged out successfully.</div>
                        <div th:if="${successMessage != null}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage != null}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
                        
                        <form th:action="@{/login}" method="post" class="row g-3">
                            <div class="col-12">
                                <label class="form-label vb-form-label">Email</label>
                                <input type="email" class="form-control" name="username" placeholder="you@example.com">
                            </div>
                            <div class="col-12">
                                <label class="form-label vb-form-label">Password</label>
                                <input type="password" class="form-control" name="password" placeholder="••••••••">
                            </div>
                            <div class="col-12">
                                <button class="btn btn-primary w-100 py-3" type="submit">Login</button>
                            </div>
                        </form>
                        <div class="d-flex justify-content-between align-items-center gap-3 mt-4 small flex-wrap">
                            <a th:href="@{/forgot-password}">Forgot password?</a>
                            <a th:href="@{/register}">Create account</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout/fragments :: footer}"></div>
<th:block th:replace="~{layout/fragments :: scripts}"></th:block>
</body>
</html>
