<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Forgot Password')}"></head>
<body class="vb-body d-flex flex-column min-vh-100">
<div th:replace="~{layout/fragments :: navbar}"></div>
<main class="container py-4 py-lg-5 flex-grow-1 d-flex align-items-center">
    <div class="auth-card auth-card-lg mx-auto shadow-soft p-0 overflow-hidden w-100">
        <div class="row g-0">
            <div class="col-lg-5 d-none d-lg-block">
                <div class="vb-auth-illustration h-100 p-5 d-flex align-items-end">
                    <div class="content">
                        <span class="vb-pill mb-3"><i class="bi bi-key-fill"></i> Recovery</span>
                        <h2 class="display-6 fw-bold mb-3">Reset access securely.</h2>
                        <p class="mb-0 opacity-90">Request a reset token and regain access without leaving the platform.</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="vb-panel h-100 border-0 rounded-0 shadow-none">
                    <div class="vb-panel-inner">
                        <span class="vb-pill mb-3"><i class="bi bi-envelope-paper"></i> Password recovery</span>
                        <h1 class="h3 mb-2">Forgot password</h1>
                        <p class="vb-faint mb-4">Enter the email attached to your account.</p>
                        
                        <div th:if="${errorMessage != null}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
                        <div th:if="${successMessage != null}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>

                        <form th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post">
                            <label class="form-label vb-form-label">Email</label>
                            <input type="email" class="form-control mb-3" th:field="*{email}">
                            <div class="text-danger small mb-3" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            <button class="btn btn-primary w-100 py-3" type="submit">Generate Reset Token</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout/fragments :: footer}"></div>
<th:block th:replace="~{layout/fragments :: scripts}"></th:block>
</body>
</html>
