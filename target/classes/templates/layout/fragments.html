<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | VentureBridge'">VentureBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark vb-navbar">
    <div class="container">
        <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" th:href="@{/}">
            <span class="vb-brand-mark"><i class="bi bi-graph-up-arrow"></i></span>
            <span>VentureBridge</span>
        </a>
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav mx-lg-auto mb-3 mb-lg-0 gap-lg-1">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="${#authorization.expression('hasRole(''INVESTOR'')')} ? @{/investor/startups} : @{/startups}">Startups</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/contact}">Contact</a></li>
            </ul>
            <div class="d-flex flex-column flex-lg-row gap-2 align-items-stretch align-items-lg-center">
                <!-- Theme Switcher -->
                <button class="btn btn-ghost btn-sm px-2 text-white me-lg-2" onclick="toggleTheme()" title="Toggle Light/Dark Theme">
                    <i class="bi bi-brightness-high" id="themeIcon"></i>
                </button>
                
                <!-- Quick links depending on Auth -->
                <a class="btn btn-ghost btn-sm" th:href="@{/login}" sec:authorize="isAnonymous()"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
                <a class="btn btn-primary btn-sm" th:href="@{/register}" sec:authorize="isAnonymous()"><i class="bi bi-person-plus me-1"></i>Register</a>
                
                <!-- Profile dropdown when Authenticated -->
                <div class="dropdown" sec:authorize="isAuthenticated()">
                    <button class="btn btn-ghost btn-sm dropdown-toggle d-flex align-items-center gap-2" type="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle fs-5"></i>
                        <span sec:authentication="name" class="d-none d-lg-inline">User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="profileDropdown" style="background: var(--vb-card);">
                        <li><a class="dropdown-item py-2" th:href="@{/dashboard}"><i class="bi bi-grid-1x2-fill text-primary me-2"></i>Dashboard</a></li>
                        <li><a class="dropdown-item py-2" th:href="@{/notifications}"><i class="bi bi-bell-fill text-warning me-2"></i>Notifications</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="px-2">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-danger btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="vb-footer mt-auto py-4">
    <div class="container">
        <div class="row align-items-center g-3">
            <div class="col-md-4 d-flex align-items-center gap-2">
                <span class="vb-brand-mark vb-brand-mark-sm"><i class="bi bi-graph-up-arrow"></i></span>
                <span class="fw-bold">VentureBridge</span>
            </div>
            <div class="col-md-4 text-md-center small text-secondary">
                &copy; 2026 VentureBridge. All rights reserved.
            </div>
            <div class="col-md-4 text-md-end">
                <a th:href="@{/about}" class="text-secondary text-decoration-none me-3 small">About</a>
                <a th:href="@{/contact}" class="text-secondary text-decoration-none small">Contact</a>
            </div>
        </div>
    </div>
</footer>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function toggleTheme() {
            const doc = document.documentElement;
            doc.classList.toggle('dark-theme');
            const isDark = doc.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'bi bi-moon-fill' : 'bi bi-brightness-high';
        }
        
        // Sync body on DOM ready
        document.addEventListener("DOMContentLoaded", function() {
            const isDark = document.documentElement.classList.contains('dark-theme');
            const body = document.body;
            if (isDark) {
                body.classList.add('dark-theme');
                const themeIcon = document.getElementById('themeIcon');
                if (themeIcon) themeIcon.className = 'bi bi-moon-fill';
            } else {
                body.classList.remove('dark-theme');
            }
        });
    </script>
</th:block>
</body>
</html>
