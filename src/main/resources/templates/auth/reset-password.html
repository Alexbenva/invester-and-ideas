<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Reset Password')}"></head>
<body class="vb-body d-flex flex-column min-vh-100">
<div th:replace="~{layout/fragments :: navbar}"></div>
<main class="container py-4 py-lg-5 flex-grow-1 d-flex align-items-center">
    <div class="auth-card auth-card-lg mx-auto shadow-soft p-0 overflow-hidden w-100">
        <div class="row g-0">
            <div class="col-lg-5 d-none d-lg-block">
                <div class="vb-auth-illustration h-100 p-5 d-flex align-items-end">
                    <div class="content">
                        <span class="vb-pill mb-3"><i class="bi bi-key-fill"></i> Recovery</span>
                        <h2 class="display-6 fw-bold mb-3">Reset access securely.</h2>
                        <p class="mb-0 opacity-90">Enter your new credentials below to regain full access to your workspace.</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="vb-panel h-100 border-0 rounded-0 shadow-none">
                    <div class="vb-panel-inner">
                        <span class="vb-pill mb-3"><i class="bi bi-lock-fill"></i> New password</span>
                        <h1 class="h3 mb-2">Reset password</h1>
                        <p class="vb-faint mb-4">Choose a strong new password for your account.</p>
                        
                        <div th:if="${errorMessage != null}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
                        
                        <form th:action="@{/reset-password}" method="post" class="row g-3">
                            <input type="hidden" name="token" th:value="${token}">
                            <div class="col-12">
                                <label class="form-label vb-form-label">New Password</label>
                                <input type="password" class="form-control" name="newPassword" required placeholder="••••••••">
                            </div>
                            <div class="col-12">
                                <label class="form-label vb-form-label">Confirm New Password</label>
                                <input type="password" class="form-control" name="confirmPassword" required placeholder="••••••••">
                            </div>
                            <div class="col-12">
                                <button class="btn btn-primary w-100 py-3" type="submit">Reset Password</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout/fragments :: footer}"></div>
<th:block th:replace="~{layout/fragments :: scripts}"></th:block>
</body>
</html>
