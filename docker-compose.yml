version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: venturebridge-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: venturebridge
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: